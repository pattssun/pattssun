<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #15202b;
      color: #e7e9ea;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat {
      flex: 1;
      background: #1e2d3d;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #1d9bf0;
    }
    .stat-label {
      font-size: 11px;
      color: #8899a6;
      margin-top: 2px;
    }
    .mode-toggle {
      display: flex;
      background: #1e2d3d;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .mode-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      color: #8899a6;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .mode-btn.active {
      background: #1d9bf0;
      color: #fff;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    button.primary {
      background: #1d9bf0;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary:hover { background: #1a8cd8; }
    button.primary:disabled {
      background: #38444d;
      color: #6e767d;
      cursor: not-allowed;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row button {
      flex: 1;
      background: #1e2d3d;
      color: #e7e9ea;
      border: 1px solid #38444d;
      border-radius: 20px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .row button:hover { background: #283d50; }
    .row button:disabled { color: #6e767d; cursor: not-allowed; }
    .log {
      background: #0d1117;
      border-radius: 8px;
      padding: 8px;
      font-family: monospace;
      font-size: 11px;
      color: #8899a6;
      max-height: 100px;
      overflow-y: auto;
      white-space: pre-wrap;
      display: none;
    }
    .log.visible { display: block; }
  </style>
</head>
<body>
  <h1>X Bookmarks Scraper</h1>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="totalCount">-</div>
      <div class="stat-label">Stored</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="newCount">-</div>
      <div class="stat-label">Last new</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="dupeCount">-</div>
      <div class="stat-label">Dupes</div>
    </div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="visible">Visible only</button>
    <button class="mode-btn" data-mode="scroll">Auto-scroll</button>
  </div>

  <div class="actions">
    <button class="primary" id="scanBtn" disabled>Scan Bookmarks</button>
    <div class="row">
      <button id="exportBtn" disabled>Save to Folder</button>
      <button id="clearBtn">Clear Data</button>
    </div>
  </div>

  <div class="log" id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
